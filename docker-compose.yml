version: '3.9'

# ── Local development compose ────────────────────────────────────────────────
# Usage:
#   docker-compose up --build          # start both services
#   docker-compose up --build -d       # detached
#   docker-compose down                # stop and remove containers

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: blue-green-backend:local
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      APP_VERSION: v1
      ENVIRONMENT: blue
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: blue-green-frontend:local
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: blue-green-network
